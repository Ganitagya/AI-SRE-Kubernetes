services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-k8s-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - RUNNING_IN_DOCKER=true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend:/app        # hot-reload in dev
      - ~/.kube:/root/.kube:ro  # mount kubeconfig (read-only)
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-k8s-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://backend:8000
      - NEXT_PUBLIC_INSFORGE_URL=https://vsij6uxi.eu-central.insforge.app
      - NEXT_PUBLIC_INSFORGE_ANON_KEY=ik_7d6daa277232104f47b52b0c31900ced
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
